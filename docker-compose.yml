version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_api
    ports:
      - '3000:3000'
    environment:
      # Connects to the 'mongo' service defined below
      - MONGO_URI=mongodb://mongo:27017/task-manager
      - JWT_SECRET=your_super_secret_jwt_key_here
      - PORT=3000
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: task_manager_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: